services:
  video-downloader:
    build:
      context: .
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    container_name: video-downloader
    ports:
      - "${HOST_PORT:-5000}:5000"
    volumes:
      - ${HOST_DOWNLOAD_PATH:-/mnt/nas/Downloads}:/mnt/nas/Downloads
      - vd-data:/data
    environment:
      DEFAULT_DOWNLOAD_PATH: "/mnt/nas/Downloads"
      ALLOWED_DOWNLOAD_ROOT: "/mnt/nas/Downloads"
      DB_PATH: "/data/jobs.db"
      SECRET_KEY: "${SECRET_KEY:?defina SECRET_KEY no .env}"
      MAX_LINKS: "${MAX_LINKS:-500}"
      MAX_UPLOAD_MB: "${MAX_UPLOAD_MB:-1}"
      MAX_JOBS_KEPT: "${MAX_JOBS_KEPT:-50}"
      MAX_WORKERS: "${MAX_WORKERS:-10}"
      DEFAULT_WORKERS: "${DEFAULT_WORKERS:-1}"
      MAX_FILESIZE_MB: "${MAX_FILESIZE_MB:-0}"
      JOB_MAX_RUNTIME_S: "${JOB_MAX_RUNTIME_S:-21600}"
      WEBHOOK_URL: "${WEBHOOK_URL:-}"
      WEBHOOK_TIMEOUT_S: "${WEBHOOK_TIMEOUT_S:-5}"
      FLASK_DEBUG: "0"
    restart: unless-stopped

volumes:
  vd-data:
